<?xml version="1.0" encoding="UTF-8"?>
<!-- Faithful SVG reproduction of MDMcircle.tex (TikZ, scale=1.5)
     Coordinate mapping: center=(300,300), 200px per TikZ unit, y-axis flipped.
     Unit circle radius = 200px. Grid from -1.2 to 1.2 (svg 60–540). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Stealth arrowhead for ultra-thick arrows (stroke-width=4).
         markerUnits=strokeWidth so dimensions scale with line width.
         refX=5 places the tip exactly at the line endpoint.
         overflow=visible prevents clipping of the arrowhead. -->
    <marker id="stealth" markerWidth="6" markerHeight="4" refX="2" refY="2"
            orient="auto" markerUnits="strokeWidth" overflow="visible">
      <path d="M0,0 L5,2 L0,4 L1.4,2 Z" fill="black"/>
    </marker>
    <!-- Axis arrow: simple open triangle for -> axes (stroke-width=1.5) -->
    <marker id="axisarrow" markerWidth="8" markerHeight="6" refX="8" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="black"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="600" height="600" fill="white"/>

  <!-- ═══ Help grid (gray!50, dashed, step=0.5, from -1.2,-1.2 to 1.2,1.2) ════
       Grid lines at x,y ∈ {-1.0, -0.5, 0, 0.5, 1.0}, spanning -1.2 to 1.2.
       svg: x/y ∈ {100,200,300,400,500}, spanning 60 to 540. -->
  <g stroke="#808080" stroke-opacity="0.5" stroke-dasharray="5,4" stroke-width="0.7" fill="none">
    <!-- Vertical lines -->
    <line x1="100" y1="60" x2="100" y2="540"/>
    <line x1="200" y1="60" x2="200" y2="540"/>
    <line x1="300" y1="60" x2="300" y2="540"/>
    <line x1="400" y1="60" x2="400" y2="540"/>
    <line x1="500" y1="60" x2="500" y2="540"/>
    <!-- Horizontal lines -->
    <line x1="60" y1="100" x2="540" y2="100"/>
    <line x1="60" y1="200" x2="540" y2="200"/>
    <line x1="60" y1="300" x2="540" y2="300"/>
    <line x1="60" y1="400" x2="540" y2="400"/>
    <line x1="60" y1="500" x2="540" y2="500"/>
  </g>

  <!-- ═══ Axes ═══ -->
  <!-- x-axis: (-1.2,0)→(1.2,0) → svg (60,300)→(540,300) -->
  <line x1="60" y1="300" x2="537" y2="300"
        stroke="black" stroke-width="1.5" marker-end="url(#axisarrow)"/>
  <!-- y-axis: (0,-1.2)→(0,1.2) → svg (300,540)→(300,60) -->
  <line x1="300" y1="540" x2="300" y2="63"
        stroke="black" stroke-width="1.5" marker-end="url(#axisarrow)"/>

  <!-- Axis labels -->
  <text x="548" y="305" font-family="Linux Libertine,Georgia,Times New Roman,serif"
        font-style="italic" font-size="20" fill="black">x</text>
  <text x="300" y="47" text-anchor="middle"
        font-family="Linux Libertine,Georgia,Times New Roman,serif"
        font-style="italic" font-size="20" fill="black">y</text>

  <!-- ═══ Edges ═══
       Node positions (θ in TikZ polar = counter-clockwise from +x):
         0°  = (500.0, 300.0)    30° = (473.2, 200.0)    60° = (400.0, 126.8)
         90° = (300.0, 100.0)   120° = (200.0, 126.8)   150° = (126.8, 200.0)
        180° = (100.0, 300.0)   210° = (126.8, 400.0)   240° = (200.0, 473.2)
        270° = (300.0, 500.0)   300° = (400.0, 473.2)   330° = (473.2, 400.0)
  -->

  <!-- Orange ultra thick: (0°)→(30°)→(60°)→(90°) -->
  <polyline points="500.0,300.0 473.2,200.0 400.0,126.8 300.0,100.0"
            stroke="orange" stroke-width="4" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Black thick arc 1: (90°)→(120°)→(150°)→(180°) -->
  <polyline points="300.0,100.0 200.0,126.8 126.8,200.0 100.0,300.0"
            stroke="black" stroke-width="2" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Black thick arc 2: (270°)→(300°)→(330°)→(360°=0°) -->
  <polyline points="300.0,500.0 400.0,473.2 473.2,400.0 500.0,300.0"
            stroke="black" stroke-width="2" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Red ultra thick: (180°)→(210°)→(240°)→(270°) -->
  <polyline points="100.0,300.0 126.8,400.0 200.0,473.2 300.0,500.0"
            stroke="red" stroke-width="4" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ═══ Directed arrows (ultra thick, -stealth, black) ═══
       Each arrow goes from a node to the midpoint of the adjacent edge segment.
       Arrow 1: 90° → mid(90°,120°) = (-0.25, 0.933) → svg (250.0, 113.4)
       Arrow 2: 120° → mid(120°,150°) = (-0.683, 0.683) → svg (163.4, 163.4)
       Arrow 3: 150° → mid(150°,180°) = (-0.933, 0.25) → svg (113.4, 250.0)
       Arrow 4: 0°  → mid(0°,330°) = (0.933, -0.25) → svg (486.6, 350.0)
       Arrow 5: 330° → mid(330°,300°) = (0.683, -0.683) → svg (436.6, 436.6)
       Arrow 6: 300° → mid(300°,270°) = (0.25, -0.933) → svg (350.0, 486.6)
  -->
  <g stroke="black" stroke-width="4" stroke-linecap="butt" marker-end="url(#stealth)">
    <line x1="300.0" y1="100.0" x2="254.8" y2="112.1"/>
    <line x1="200.0" y1="126.8" x2="166.9" y2="159.9"/>
    <line x1="126.8" y1="200.0" x2="114.7" y2="245.2"/>
    <line x1="500.0" y1="300.0" x2="487.9" y2="345.2"/>
    <line x1="473.2" y1="400.0" x2="440.1" y2="433.1"/>
    <line x1="400.0" y1="473.2" x2="354.8" y2="485.3"/>
  </g>

  <!-- ═══ Bullet nodes (•) at all 12 positions on the unit circle ═══
       Unmatched (no arrow from them): 30°,60° (orange arc) → orange
                                       180°,210°,240°,270° (red arc) → red
       Matched (have arrows):  0°,90°,120°,150°,300°,330° → black -->

  <!-- Orange unmatched bullets: 30°, 60° -->
  <g fill="orange">
    <circle cx="473.2" cy="200.0" r="5.5"/>  <!-- 30°  -->
    <circle cx="400.0" cy="126.8" r="5.5"/>  <!-- 60°  -->
  </g>

  <!-- Red unmatched bullets: 180°, 210°, 240°, 270° -->
  <g fill="red">
    <circle cx="100.0" cy="300.0" r="5.5"/>  <!-- 180° -->
    <circle cx="126.8" cy="400.0" r="5.5"/>  <!-- 210° -->
    <circle cx="200.0" cy="473.2" r="5.5"/>  <!-- 240° -->
    <circle cx="300.0" cy="500.0" r="5.5"/>  <!-- 270° -->
  </g>

  <!-- Black matched bullets: 0°, 90°, 120°, 150°, 300°, 330° -->
  <g fill="black">
    <circle cx="500.0" cy="300.0" r="5.5"/>  <!-- 0°   -->
    <circle cx="300.0" cy="100.0" r="5.5"/>  <!-- 90°  -->
    <circle cx="200.0" cy="126.8" r="5.5"/>  <!-- 120° -->
    <circle cx="126.8" cy="200.0" r="5.5"/>  <!-- 150° -->
    <circle cx="400.0" cy="473.2" r="5.5"/>  <!-- 300° -->
    <circle cx="473.2" cy="400.0" r="5.5"/>  <!-- 330° -->
  </g>
</svg>
